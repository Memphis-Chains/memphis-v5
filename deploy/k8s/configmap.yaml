apiVersion: v1
kind: ConfigMap
metadata:
  name: memphis-config
  labels:
    app: memphis
data:
  config.env: |
    NODE_ENV=production
    HOST=0.0.0.0
    PORT=3000
    LOG_LEVEL=info
    LOG_FORMAT=json
    DEFAULT_PROVIDER=local-fallback
    DATABASE_URL=file:/app/data/memphis-v5.db
    RUST_CHAIN_ENABLED=false
