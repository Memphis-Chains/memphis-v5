name: weekly-bridge-recovery-drill

on:
  workflow_dispatch:
  schedule:
    - cron: '45 3 * * 1' # Monday 03:45 UTC

jobs:
  recovery-drill:
    runs-on: [self-hosted, linux]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run bridge recovery drill
        run: ./scripts/drill-ollama-bridge-recovery.sh

      - name: Open incident on drill failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🚨 Weekly bridge recovery drill failed';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `Recovery drill failed. Run: ${runUrl}`
            });
