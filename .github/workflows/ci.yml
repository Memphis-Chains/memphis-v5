name: ci

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust clippy
        run: rustup component add clippy

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Secret scan
        run: ./scripts/secret-scan.sh

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test

      - name: Retrieval benchmark gate
        run: npm run bench:retrieval:gate

      - name: CLI + TUI latency benchmark
        continue-on-error: true
        run: npm run bench:cli-tui

      - name: CLI + TUI latency gate
        continue-on-error: true
        run: npm run bench:cli-tui:gate

      - name: Retrieval benchmark summary
        if: always()
        run: |
          REPORT_MD="data/retrieval-benchmark-reports/latest.md"
          REPORT_JSON="data/retrieval-benchmark-reports/latest.json"
          {
            echo "## Retrieval benchmark gate"
            if [ -f "$REPORT_MD" ]; then
              cat "$REPORT_MD"
            else
              echo "- report markdown missing: $REPORT_MD"
            fi
            if [ -f "$REPORT_JSON" ]; then
              echo ""
              echo "### Raw JSON path"
              echo "\`$REPORT_JSON\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: CLI + TUI latency benchmark summary
        if: always()
        run: |
          REPORT_MD="data/cli-tui-latency-benchmark-reports/latest.md"
          REPORT_JSON="data/cli-tui-latency-benchmark-reports/latest.json"
          {
            echo "## CLI + TUI latency benchmark"
            if [ -f "$REPORT_MD" ]; then
              cat "$REPORT_MD"
            else
              echo "- report markdown missing: $REPORT_MD"
            fi
            if [ -f "$REPORT_JSON" ]; then
              echo ""
              echo "### Raw JSON path"
              echo "\`$REPORT_JSON\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload retrieval benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: retrieval-benchmark-reports
          if-no-files-found: warn
          path: |
            data/retrieval-benchmark-reports/latest.json
            data/retrieval-benchmark-reports/latest.md

      - name: Upload CLI + TUI latency benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cli-tui-latency-benchmark-reports
          if-no-files-found: warn
          path: |
            data/cli-tui-latency-benchmark-reports/latest.json
            data/cli-tui-latency-benchmark-reports/latest.md

      - name: Build
        run: npm run build

      - name: Cargo test
        run: cargo test --workspace

      - name: Rust core safety gate
        run: npm run -s ops:rust-core:safety

      - name: Ops quality runtime pack
        run: npm run ops:quality-runtime-pack:json
