name: Build NAPI Binaries

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64-gnu
            rust_target: x86_64-unknown-linux-gnu
            artifact_name: linux-x64.node
          - os: ubuntu-latest
            target: linux-arm64-gnu
            rust_target: aarch64-unknown-linux-gnu
            artifact_name: linux-arm64.node
          - os: macos-latest
            target: darwin-x64
            rust_target: x86_64-apple-darwin
            artifact_name: darwin-x64.node
          - os: macos-latest
            target: darwin-arm64
            rust_target: aarch64-apple-darwin
            artifact_name: darwin-arm64.node
          - os: windows-latest
            target: win32-x64-msvc
            rust_target: x86_64-pc-windows-msvc
            artifact_name: win32-x64.dll

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Setup Linux ARM64 linker
        if: matrix.target == 'linux-arm64-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build native binary
        run: cargo build --release -p memphis-napi --target ${{ matrix.rust_target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp "target/${{ matrix.rust_target }}/release/libmemphis_napi.dylib" "crates/memphis-napi/${{ matrix.artifact_name }}" || \
          cp "target/${{ matrix.rust_target }}/release/libmemphis_napi.so" "crates/memphis-napi/${{ matrix.artifact_name }}"

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.rust_target }}/release/memphis_napi.dll" "crates/memphis-napi/${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: crates/memphis-napi/${{ matrix.artifact_name }}

      - name: Commit binary to repository
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "crates/memphis-napi/${{ matrix.artifact_name }}"
          git diff --cached --quiet || git commit -m "chore(ci): update ${{ matrix.target }} native binary [skip ci]"
          git push
