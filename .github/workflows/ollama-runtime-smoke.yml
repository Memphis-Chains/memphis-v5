name: ollama-runtime-smoke

on:
  workflow_dispatch:
    inputs:
      force_fail:
        description: "Set true to intentionally fail for alert drill"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '17 3 * * *' # daily 03:17 UTC

jobs:
  smoke-ollama-runtime:
    runs-on: [self-hosted, linux]
    timeout-minutes: 15
    env:
      INCIDENT_OWNER: ${{ vars.OLLAMA_INCIDENT_OWNER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Ensure bridge service is running
        run: |
          systemctl --user daemon-reload || true
          systemctl --user enable --now ollama-compat-bridge.service
          systemctl --user enable --now ollama-bridge-healthcheck.timer || true

      - name: Runtime smoke (qwen3.5:2b)
        run: npm run smoke:ollama-runtime

      - name: Optional forced failure drill
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.force_fail }}
        run: |
          echo "Forced failure drill requested"
          exit 1

      - name: Alert on failure (dedup + ack + severity)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🚨 Nightly Ollama runtime smoke failed';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const owner = process.env.INCIDENT_OWNER && process.env.INCIDENT_OWNER.trim() ? process.env.INCIDENT_OWNER.trim() : 'Memphis-Chains';

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name });
              } catch {
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name, color, description });
              }
            }

            await ensureLabel('incident', 'd73a4a', 'Operational incident');
            await ensureLabel('needs-ack', 'fbca04', 'Needs operator acknowledgment');
            await ensureLabel('sev1', 'b60205', 'High severity');
            await ensureLabel('sev2', 'e99695', 'Moderate severity');

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const existing = openIssues.find((i) => !i.pull_request && i.title === title);
            let consecutive = 1;
            if (existing) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                per_page: 100
              });
              const prev = comments
                .map((c) => (c.body || '').match(/Consecutive failures:\s*(\d+)/i))
                .filter(Boolean)
                .map((m) => Number(m[1]))
                .filter((n) => Number.isFinite(n));
              consecutive = (prev.length ? Math.max(...prev) : 1) + 1;
            }

            const severity = consecutive >= 2 ? 'sev1' : 'sev2';
            const body = [
              'Automated alert from `ollama-runtime-smoke` workflow.',
              '',
              `Run: ${runUrl}`,
              `Consecutive failures: ${consecutive}`,
              `Severity: ${severity}`,
              `Owner: @${owner}`,
              '',
              'Please check bridge service, health timer, and runtime smoke logs.'
            ].join('\n');

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
              await github.rest.issues.setLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                labels: ['incident', 'needs-ack', severity]
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['incident', 'needs-ack', severity]
              });
            }

      - name: Optional webhook alert
        if: failure() && vars.OLLAMA_SMOKE_ALERT_WEBHOOK != ''
        run: |
          curl -sS -X POST "${{ vars.OLLAMA_SMOKE_ALERT_WEBHOOK }}" \
            -H 'content-type: application/json' \
            -d "{\"text\":\"🚨 memphis-v4 nightly ollama-runtime-smoke FAILED: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

      - name: Auto-close incident on recovery
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🚨 Nightly Ollama runtime smoke failed';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const existing = openIssues.find((i) => !i.pull_request && i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Recovery detected ✅. Closing incident. Successful run: ${runUrl}`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed'
              });
            }